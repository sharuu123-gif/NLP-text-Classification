<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NLP Text Classifier</title>
  <link rel="stylesheet" href="/static/style.css"/>
</head>
<body>
  <div class="container">
    <h1>🧠 NLP Text Classifier</h1>
    <p class="subtitle">Classify web text into: World · Sports · Business · Technology</p>

    <textarea id="inputText" rows="6"
      placeholder="Paste any news article or web text here..."></textarea>

    <button onclick="classify()">🔍 Classify</button>

    <div id="result" class="result hidden">
      <h2>Prediction</h2>
      <div id="category" class="category-badge"></div>
      <div id="confidence"></div>
      <div id="all-probs"></div>
    </div>
  </div>

  <script>
    async function classify() {
      const text = document.getElementById('inputText').value.trim();
      if (!text) { alert('Please enter some text!'); return; }

      const res  = await fetch('/predict', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text })
      });
      const data = await res.json();
      if (data.error) { alert(data.error); return; }

      document.getElementById('category').textContent  = '📌 ' + data.category;
      document.getElementById('confidence').textContent =
        `Confidence: ${(data.confidence * 100).toFixed(1)}%`;

      const probsHtml = Object.entries(data.all_probs)
        .map(([k, v]) => `<div>${k}: ${(v*100).toFixed(1)}%</div>`)
        .join('');
      document.getElementById('all-probs').innerHTML = probsHtml;
      document.getElementById('result').classList.remove('hidden');
    }
  </script>
</body>
</html>
